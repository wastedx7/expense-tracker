spring.application.name=eureka-service

# The port where the Eureka dashboard and service will run
server.port=8761

# The hostname of the server
eureka.instance.hostname=localhost

# CRITICAL: Tell this server NOT to register itself as a client
eureka.client.register-with-eureka=false

# CRITICAL: Tell this server NOT to fetch the registry from other servers
eureka.client.fetch-registry=false

# The local URL where client microservices can find this registry
eureka.client.service-url.defaultZone=http://${eureka.instance.hostname}:${server.port}/eureka/